name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vaultshare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Spring Boot app
        run: mvn -B -DskipTests package

      - name: Build Docker image
        run: docker build -t vaultshare:${{ github.sha }} .

  deploy:
    name: Deploy to Koyeb
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Install and configure Koyeb CLI
        uses: koyeb-community/koyeb-actions@v2
        with:
          api_token: ${{ secrets.KOYEB_API_TOKEN }}

      - name: Deploy service from GitHub repository
        uses: koyeb/action-git-deploy@v1
        with:
          app-name: vaultshare
          service-name: vaultshare
          git-branch: main
          git-builder: docker
          service-instance-type: free
          service-regions: fra
          service-ports: "8080:http"
          service-routes: "/:8080"
          service-checks: "8080:http:/healthz"
          service-env: "PORT=8080,VAULTSHARE_DATA_DIR=/app/data,VAULTSHARE_UPLOAD_DIR=/app/uploads,VAULTSHARE_ENABLE_PASSWORD=false"
