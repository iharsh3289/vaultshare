name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vaultshare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Spring Boot app
        run: mvn -B -DskipTests package

      - name: Build Docker image
        run: docker build -t vaultshare:${{ github.sha }} .

  # Deployment to Render is managed by Render via render.yaml and GitHub repo integration.
  # The build job verifies the Spring Boot app and Docker image on every PR and push.
